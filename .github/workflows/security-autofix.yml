name: Security autofix

# When the Security scan fails (a high/critical advisory, a CodeQL alert, or a
# leaked-secret detection), an agent triages the finding and opens a remediation
# PR. Security response without a human in the critical path for triage — but
# always with a human approving the merge.

on:
  workflow_run:
    workflows: ["Security scan"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write   # required by claude-code-action to mint a GitHub token via OIDC
  actions: read
  security-events: read

jobs:
  remediate:
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_branch == 'master'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Gather the security findings
        run: |
          npm ci
          npm audit --json > /tmp/npm-audit.json 2>/dev/null || true
          echo "----- npm audit summary -----"
          npm audit || true
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: anthropics/claude-code-action@v1
        with:
          # Subscription auth (see claude.yml for the API-key alternative).
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          branch_prefix: "security-fix/"
          prompt: |
            The Security scan failed on master (run id
            ${{ github.event.workflow_run.id }}). Remediate the dependency
            advisories efficiently — work directly, minimize exploration.

            Recommended path (don't over-investigate):
              1. Run `npm audit` to see the advisories.
              2. Run `npm audit fix` (WITHOUT --force) to auto-resolve what's
                 safe. Only hand-edit a version/override for advisories that
                 `npm audit fix` leaves behind.
              3. Verify in one pass: `npm ci`, `npm run lint`,
                 `npm run test:run`, `npm run build`.
              4. Open ONE PR summarizing the advisories fixed, their severity,
                 and any breaking-change risk. List anything that still needs a
                 human (e.g. advisories that only a major bump would fix).

            Anything that requires a major-version bump with breaking changes:
            do NOT force it — note it in the PR body for human follow-up and
            move on. The goal is a clean, mergeable PR within your turn budget,
            not zero remaining advisories.

            If a secret was flagged: treat it as compromised, remove it, and
            flag in the PR that a human must rotate it. Follow
            .github/AGENT_GUARDRAILS.md.
          claude_args: "--max-turns 30"
