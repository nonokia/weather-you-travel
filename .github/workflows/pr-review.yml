name: Agent PR review

# An agent reviews each new PR for correctness, security, and test gaps, and
# leaves inline comments. Read-only: it can run commands and read files, but is
# NOT given Edit/Write — it comments, it does not change code.
#
# Runs once when a PR is opened/reopened/marked ready — deliberately NOT on
# every push (`synchronize`), to conserve the agent-credit pool. To re-review
# after changes, close/reopen the PR or mention @claude.
#
# NOTE: PRs that modify `.github/workflows/**` are skipped. GitHub refuses to
# mint the review app-token (via OIDC) for a PR whose workflow files differ
# from the default branch — a security measure against a PR rewriting a
# workflow to capture the token. The action fails with "Workflow validation
# failed" on such PRs, so we detect that case and skip cleanly (those PRs get
# human review anyway).

on:
  pull_request:
    types: [opened, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write   # required by claude-code-action to mint a GitHub token via OIDC

jobs:
  review:
    if: >
      github.event.pull_request.draft == false &&
      !contains(toJSON(github.event.pull_request.labels.*.name), 'skip-review')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip review when the PR modifies workflows
        id: guard
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          if gh pr view "$PR" --repo "$GITHUB_REPOSITORY" --json files --jq '.files[].path' \
               | grep -qE '^\.github/workflows/'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::PR changes .github/workflows/**; GitHub won't mint the review app-token for workflow-modifying PRs. Skipping the agent review (this PR gets human review)."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.guard.outputs.skip == 'false'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # agent-build opens PRs authored by a bot, so this review run is
          # bot-initiated; allow it (claude-code-action blocks bots by default).
          allowed_bots: "*"
          use_sticky_comment: true
          prompt: |
            Review pull request #${{ github.event.pull_request.number }}
            ("${{ github.event.pull_request.title }}") on this repository.

            Look at the PR diff (e.g. `git diff origin/${{ github.event.pull_request.base.ref }}...HEAD`)
            and review ONLY for things that matter:
              - correctness bugs and logic errors,
              - security issues,
              - missing or inadequate test coverage for new behavior,
              - the .github/AGENT_GUARDRAILS.md red flags: tests weakened or
                deleted, secrets committed, changes outside the PR's stated scope.

            Do NOT nitpick style or formatting. Leave concise inline comments on
            the specific lines, each with a concrete suggested fix. If the PR is
            clean, post a single short "LGTM" summary comment naming what you
            checked.

            You are a REVIEWER: do not modify any code. Comment only.
          claude_args: "--max-turns 12 --allowedTools Bash,Read,Glob,Grep"
