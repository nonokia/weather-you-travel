name: Security scan

# Static analysis, dependency auditing, and secret scanning. Findings here feed
# the Security autofix workflow, which turns a failed audit into a remediation
# PR automatically.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "0 6 * * *" # daily 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # NOTE: CodeQL static analysis is handled by GitHub's *default* code-scanning
  # setup (enabled in repo Settings → Code security). Running a second advanced
  # CodeQL job here conflicts with it ("CodeQL job status was configuration
  # error") and fails the scan, so we rely on the default setup instead.

  dependency-audit:
    name: npm audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Fail the job on high/critical advisories so the autofix loop is triggered.
      # The JSON report is uploaded for the agent to consume.
      - name: Audit dependencies
        run: |
          npm audit --json > npm-audit.json || true
          npm audit --audit-level=high
      - name: Upload audit report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit
          path: npm-audit.json
          retention-days: 14

  secret-scan:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
